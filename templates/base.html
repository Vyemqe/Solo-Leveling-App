<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM | Solo Leveling</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --sl-blue: #00f0ff; --sl-dark: #070a13; --sl-panel: rgba(12, 18, 34, 0.85); }
        body {
            margin: 0; padding: 0; background-color: var(--sl-dark); color: #fff;
            font-family: 'Rajdhani', sans-serif;
            background-image: radial-gradient(circle at center, #111a30 0%, #04060b 100%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        /* Navigation */
        nav { width: 100%; background: var(--sl-panel); border-bottom: 1px solid var(--sl-blue); display: flex; justify-content: center; padding: 15px 0; margin-bottom: 30px; }
        .nav-links { width: 800px; display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: #fff; text-decoration: none; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover { color: var(--sl-blue); text-shadow: 0 0 10px var(--sl-blue); }
        .brand { font-size: 1.5rem; color: var(--sl-blue); margin-right: auto; letter-spacing: 3px; }
        
        .container { width: 800px; display: grid; gap: 20px; }
        .panel {
            background: var(--sl-panel); border: 1px solid var(--sl-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); padding: 20px; border-radius: 4px;
        }
        h2 { margin-top: 0; color: var(--sl-blue); text-transform: uppercase; letter-spacing: 2px; }
        
        button, .btn { 
            background: transparent; border: 1px solid var(--sl-blue); color: var(--sl-blue);
            padding: 8px 15px; cursor: pointer; font-family: 'Rajdhani'; font-weight: bold; 
            text-transform: uppercase; text-decoration: none; display: inline-block; text-align: center;
        }
        button:hover, .btn:hover { background: var(--sl-blue); color: var(--sl-dark); }
        
        /* Minecraft Toast */
        .mc-toast {
            position: fixed; top: -100px; right: 20px; width: 320px;
            background: #212121; border: 2px solid #555; border-radius: 2px;
            display: flex; align-items: center; padding: 12px;
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.5), inset 2px 2px 0px rgba(255,255,255,0.2), 4px 4px 0px rgba(0,0,0,0.5);
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; font-family: 'Courier New', Courier, monospace;
        }
        .mc-toast.show { top: 20px; }
        .mc-icon { width: 32px; height: 32px; margin-right: 15px; flex-shrink: 0; }
        .icon-sword { background: url('https://minecraft.wiki/images/Diamond_Sword_JE2_BE2.png') no-repeat center/contain; image-rendering: pixelated; }
        .icon-text { 
            background: #555; border: 2px solid #333; color: #fff; 
            display: flex; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 1.2rem; box-shadow: inset 2px 2px 0 #777;
        }
        .mc-title { color: #ffff55; font-size: 14px; margin-bottom: 4px; font-weight: bold; }
        .mc-desc { color: #ffffff; font-size: 14px; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-links">
            <div class="brand">SYSTEM</div>
            <a href="/">Dashboard</a>
            <a href="/achievements">Achievements</a>
            <a href="/history">History</a>
        </div>
    </nav>

    <!-- Toast UI -->
    <div class="mc-toast" id="mcToast">
        <div class="mc-icon icon-sword" id="mcIcon"></div>
        <div>
            <div class="mc-title" id="mcTitle">Achievement Get!</div>
            <div class="mc-desc" id="mcDesc">Task Completed</div>
        </div>
    </div>

    <!-- Content Block -->
    {% block content %}{% endblock %}
    <script>
        // Global Toast Queue Engine
        const toastQueue = [];
        let isToasting = false;

        function addToast(title, desc, iconType) {
            toastQueue.push({title, desc, iconType});
            if (!isToasting) showNextToast();
        }

        function showNextToast() {
            if (toastQueue.length === 0) { isToasting = false; return; }
            isToasting = true;
            const toastInfo = toastQueue.shift();
            
            document.getElementById('mcTitle').innerText = toastInfo.title;
            document.getElementById('mcDesc').innerText = toastInfo.desc;
            
            const iconEl = document.getElementById('mcIcon');
            if (toastInfo.iconType === 'sword') {
                iconEl.className = 'mc-icon icon-sword';
                iconEl.innerText = '';
            } else {
                iconEl.className = 'mc-icon icon-text';
                iconEl.innerText = toastInfo.iconType; // E.g., "5" or "D"
            }
            const toast = document.getElementById('mcToast');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(showNextToast, 600); // Wait for slide-up animation before next
            }, 3500);
        }
    </script>
</body>
</html>
